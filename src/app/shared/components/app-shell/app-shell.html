<mat-sidenav-container class="shell-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Dashboard
      </a>
      <a mat-list-item routerLink="/products" routerLinkActive="active-link">Products</a>
      <!-- More links (Customers, Orders, ...) get added here
           as we build each feature in the phases ahead. -->
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <span>OMS</span>
      <span class="spacer"></span>
      @if (authService.currentUser(); as user) {
        <span class="user-info">{{ user.username }} ({{ user.role }})</span>
        <button mat-icon-button (click)="logout()" aria-label="Log out">
          <mat-icon>logout</mat-icon>
        </button>
      }
    </mat-toolbar>

    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
