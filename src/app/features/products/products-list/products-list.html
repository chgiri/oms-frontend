<div class="products-page">
  <div class="header">
    <h2>Products</h2>
    <a mat-flat-button color="primary" routerLink="/products/new">
      <mat-icon>add</mat-icon> New product
    </a>
  </div>

  <form [formGroup]="filterForm" class="filters">
    <mat-form-field appearance="outline">
      <mat-label>Search by name</mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Min price</mat-label>
      <input matInput type="number" formControlName="minPrice" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Max price</mat-label>
      <input matInput type="number" formControlName="maxPrice" />
    </mat-form-field>
  </form>

  @if (loading()) {
    <div class="loading-row">
      <mat-spinner diameter="32"></mat-spinner>
    </div>
  }
  <table mat-table [dataSource]="products()" matSort (matSortChange)="onSortChange($event)">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let product">{{ product.name }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let product">{{ product.description ?? '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
      <td mat-cell *matCellDef="let product">{{ product.price | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="updatedAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Updated</th>
      <td mat-cell *matCellDef="let product">{{ product.updatedAt | date: 'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let product">
        <button mat-icon-button (click)="editProduct(product)" aria-label="Edit">
          <mat-icon>edit</mat-icon>
        </button>
        <button
          *appHasRole="['ADMIN']"
          mat-icon-button
          color="warn"
          (click)="deleteProduct(product)"
          aria-label="Delete"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageIndex]="pageIndex()"
    [length]="totalElements()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPageChange($event)"
  ></mat-paginator>
</div>
