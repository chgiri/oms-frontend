<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>{{ isEditMode ? 'Edit stock record' : 'New stock record' }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Product</mat-label>
        <mat-select formControlName="productId">
          @for (product of products(); track product.id) {
            <mat-option [value]="product.id">{{ product.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Location</mat-label>
        <input matInput formControlName="location" placeholder="WH-EAST-01" />
      </mat-form-field>

      <div class="row">
        <mat-form-field appearance="outline">
          <mat-label>Quantity available</mat-label>
          <input matInput type="number" formControlName="quantityAvailable" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Quantity reserved</mat-label>
          <input matInput type="number" formControlName="quantityReserved" />
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Reorder level</mat-label>
        <input matInput type="number" formControlName="reorderLevel" />
      </mat-form-field>

      @if (errorMessage()) {
        <p class="error">{{ errorMessage() }}</p>
      }

      <div class="actions">
        <button mat-button type="button" routerLink="/inventory">Cancel</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="saving()">Save</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
