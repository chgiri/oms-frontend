<div class="orders-page">
  <div class="header">
    <h2>Orders</h2>
    <a mat-flat-button color="primary" routerLink="/orders/new">
      <mat-icon>add</mat-icon> New order
    </a>
  </div>

  <form [formGroup]="filterForm" class="filters">
    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select formControlName="status">
        <mat-option [value]="null">Any</mat-option>
        @for (status of statuses; track status) {
          <mat-option [value]="status">{{ status }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </form>

  @if (loading()) {
    <div class="loading-row">
      <mat-spinner diameter="32"></mat-spinner>
    </div>
  }
  <table mat-table [dataSource]="orders()">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let order">{{ order.id }}</td>
    </ng-container>

    <ng-container matColumnDef="customerName">
      <th mat-header-cell *matHeaderCellDef>Customer</th>
      <td mat-cell *matCellDef="let order">{{ order.customerName }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let order">
        <mat-chip [color]="order.status === 'CANCELLED' ? 'warn' : 'primary'">{{
          order.status
        }}</mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="totalAmount">
      <th mat-header-cell *matHeaderCellDef>Total</th>
      <td mat-cell *matCellDef="let order">{{ order.totalAmount | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Placed</th>
      <td mat-cell *matCellDef="let order">{{ order.createdAt | date: 'short' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let order" (click)="$event.stopPropagation()">
        <button mat-icon-button (click)="viewOrder(order)" aria-label="View">
          <mat-icon>visibility</mat-icon>
        </button>

        <span
          *appHasRole="['ADMIN']"
          [matTooltip]="isDeletable(order) ? '' : 'Only PENDING or CANCELLED orders can be deleted'"
          matTooltipPosition="above"
          [class.disabled-action]="!isDeletable(order)"
        >
          <button
            mat-icon-button
            color="warn"
            [disabled]="!isDeletable(order)"
            (click)="deleteOrder(order)"
            aria-label="Delete"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      (click)="viewOrder(row)"
      (keydown.enter)="viewOrder(row)"
      tabindex="0"
      role="button"
      [attr.aria-label]="'View order ' + row.id"
      class="clickable-row"
    ></tr>
  </table>

  <mat-paginator
    [pageIndex]="pageIndex()"
    [length]="totalElements()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPageChange($event)"
  ></mat-paginator>
</div>
